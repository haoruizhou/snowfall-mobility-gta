version: '3.8'

# 16 parallel OSRM instances on ports 5000–5015.
# Routes are distributed across instances in round-robin to maximise throughput.
#
# Prerequisites:
#   1. Download the Ontario OSM extract:
#      wget https://download.geofabrik.de/north-america/canada/ontario-latest.osm.pbf
#   2. Pre-process with OSRM (MLD pipeline):
#      docker run -t -v "$(pwd):/data" osrm/osrm-backend osrm-extract -p /opt/car.lua /data/ontario-latest.osm.pbf
#      docker run -t -v "$(pwd):/data" osrm/osrm-backend osrm-partition /data/ontario-latest.osrm
#      docker run -t -v "$(pwd):/data" osrm/osrm-backend osrm-customize /data/ontario-latest.osrm
#   3. Place the processed files in this directory, then:
#      docker compose -f docker-compose-osrm.yml up -d

services:
  osrm-0:
    image: osrm/osrm-backend:latest
    container_name: osrm-backend-0
    restart: always
    volumes:
      - .:/data
    ports:
      - "5000:5000"
    command: osrm-routed --algorithm mld /data/ontario-latest.osrm

  osrm-1:
    image: osrm/osrm-backend:latest
    container_name: osrm-backend-1
    restart: always
    volumes:
      - .:/data
    ports:
      - "5001:5000"
    command: osrm-routed --algorithm mld /data/ontario-latest.osrm

